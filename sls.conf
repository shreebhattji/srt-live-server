srt {
    worker_threads  8;
    worker_connections 100;

    log_file /var/log/sls.log;
    log_level info;

    server {
        listen 1937;
        latency 200;

        domain_player shree;
        domain_publisher domain_publisher;

        backlog 100;
        idle_streams_timeout 15;

        app {
            app_player bhatt;
            app_publisher app_publisher;

            relay {
                type push;
                mode all;
                reconnect_interval 10;
                idle_streams_timeout 10;
            }
        }
    }
}
